name: Test AWS Access

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::537501962693:role/github-actions-deploy
          aws-region: us-east-1

      - name: Test S3 access
        run: |
          echo "=== Identity ==="
          aws sts get-caller-identity
          
          echo "=== Test S3 Create Bucket ==="
          aws s3api create-bucket --bucket brainstormagi-com-website --region us-east-1 2>&1 || echo "Bucket exists or no permission"
          
          echo "=== Test S3 List ==="
          aws s3 ls 2>&1 | head -5 || echo "No S3 list permission"
          
          echo "=== Test ACM ==="
          aws acm list-certificates --region us-east-1 2>&1 | head -5 || echo "No ACM permission"
          
          echo "=== Test CloudFront ==="
          aws cloudfront list-distributions 2>&1 | head -5 || echo "No CF permission"
