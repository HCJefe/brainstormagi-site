name: Deploy Static Site

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'setup, deploy, or status'
        required: true
        default: 'setup'
        type: choice
        options:
          - setup
          - deploy
          - status

permissions:
  id-token: write
  contents: read

jobs:
  static-site:
    runs-on: ubuntu-latest
    env:
      SITE: brainstormagi.com
      BUCKET: brainstormagi-com-website
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@fb7eb401298e393da51cdcb2feb1ed0183619014
        with:
          role-to-assume: arn:aws:iam::537501962693:role/github-actions-deploy
          aws-region: us-east-1

      - name: Setup Infrastructure
        if: inputs.action == 'setup'
        run: |
          set -e
          echo "=== Step 1: Create S3 Bucket ==="
          aws s3api create-bucket --bucket "$BUCKET" --region us-east-1 2>/dev/null || echo "Bucket exists"
          
          echo "=== Step 2: Disable Block Public Access ==="
          aws s3api put-public-access-block --bucket "$BUCKET" \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
          
          echo "=== Step 3: Set Bucket Policy ==="
          aws s3api put-bucket-policy --bucket "$BUCKET" --policy "{
            \"Version\": \"2012-10-17\",
            \"Statement\": [{
              \"Sid\": \"PublicReadGetObject\",
              \"Effect\": \"Allow\",
              \"Principal\": \"*\",
              \"Action\": \"s3:GetObject\",
              \"Resource\": \"arn:aws:s3:::${BUCKET}/*\"
            }]
          }"
          
          echo "=== Step 4: Enable Static Website Hosting ==="
          aws s3 website "s3://$BUCKET/" --index-document index.html --error-document index.html
          
          echo "=== Step 5: Request/Find ACM Certificate ==="
          CERT_ARN=$(aws acm list-certificates --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='${SITE}'].CertificateArn" --output text)
          
          if [ -z "$CERT_ARN" ] || [ "$CERT_ARN" = "None" ]; then
            CERT_ARN=$(aws acm request-certificate \
              --domain-name "$SITE" \
              --subject-alternative-names "*.${SITE}" \
              --validation-method DNS \
              --region us-east-1 \
              --query 'CertificateArn' --output text)
            echo "New certificate requested: $CERT_ARN"
            sleep 15
          else
            echo "Existing certificate found: $CERT_ARN"
          fi
          
          echo "=== Step 6: DNS Validation via Route 53 ==="
          HOSTED_ZONE_ID="Z0634259PESIHO5MNZYR"
          
          VALIDATION=$(aws acm describe-certificate --certificate-arn "$CERT_ARN" --region us-east-1 \
            --query 'Certificate.DomainValidationOptions[0].ResourceRecord' --output json)
          
          CNAME_NAME=$(echo "$VALIDATION" | jq -r '.Name')
          CNAME_VALUE=$(echo "$VALIDATION" | jq -r '.Value')
          
          if [ -n "$CNAME_NAME" ] && [ "$CNAME_NAME" != "null" ]; then
            aws route53 change-resource-record-sets --hosted-zone-id "$HOSTED_ZONE_ID" --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${CNAME_NAME}\",
                  \"Type\": \"CNAME\",
                  \"TTL\": 300,
                  \"ResourceRecords\": [{\"Value\": \"${CNAME_VALUE}\"}]
                }
              }]
            }" || echo "DNS validation record may already exist"
          fi
          
          echo "=== Step 7: Wait for Certificate Validation ==="
          CERT_STATUS="PENDING_VALIDATION"
          for i in $(seq 1 30); do
            CERT_STATUS=$(aws acm describe-certificate --certificate-arn "$CERT_ARN" --region us-east-1 \
              --query 'Certificate.Status' --output text)
            echo "Attempt $i: Certificate status = $CERT_STATUS"
            if [ "$CERT_STATUS" = "ISSUED" ]; then break; fi
            sleep 10
          done
          
          if [ "$CERT_STATUS" != "ISSUED" ]; then
            echo "ERROR: Certificate not yet validated after 5 minutes. Re-run setup later."
            exit 1
          fi
          
          echo "=== Step 8: Create CloudFront Distribution ==="
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items,'${SITE}')].Id" --output text 2>/dev/null)
          
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            CALLER_REF="brainstormagi-$(date +%s)"
            
            RESULT=$(aws cloudfront create-distribution --distribution-config "{
              \"CallerReference\": \"${CALLER_REF}\",
              \"Aliases\": {
                \"Quantity\": 2,
                \"Items\": [\"${SITE}\", \"www.${SITE}\"]
              },
              \"DefaultRootObject\": \"index.html\",
              \"Origins\": {
                \"Quantity\": 1,
                \"Items\": [{
                  \"Id\": \"S3-${BUCKET}\",
                  \"DomainName\": \"${BUCKET}.s3-website-us-east-1.amazonaws.com\",
                  \"CustomOriginConfig\": {
                    \"HTTPPort\": 80,
                    \"HTTPSPort\": 443,
                    \"OriginProtocolPolicy\": \"http-only\"
                  }
                }]
              },
              \"DefaultCacheBehavior\": {
                \"TargetOriginId\": \"S3-${BUCKET}\",
                \"ViewerProtocolPolicy\": \"redirect-to-https\",
                \"AllowedMethods\": {
                  \"Quantity\": 2,
                  \"Items\": [\"HEAD\", \"GET\"],
                  \"CachedMethods\": {
                    \"Quantity\": 2,
                    \"Items\": [\"HEAD\", \"GET\"]
                  }
                },
                \"Compress\": true,
                \"CachePolicyId\": \"658327ea-f89d-4fab-a63d-7e88639e58f6\",
                \"MinTTL\": 0,
                \"DefaultTTL\": 86400,
                \"MaxTTL\": 31536000
              },
              \"CustomErrorResponses\": {
                \"Quantity\": 1,
                \"Items\": [{
                  \"ErrorCode\": 404,
                  \"ResponseCode\": \"200\",
                  \"ResponsePagePath\": \"/index.html\",
                  \"ErrorCachingMinTTL\": 300
                }]
              },
              \"Comment\": \"${SITE} static site\",
              \"Enabled\": true,
              \"ViewerCertificate\": {
                \"ACMCertificateArn\": \"${CERT_ARN}\",
                \"SSLSupportMethod\": \"sni-only\",
                \"MinimumProtocolVersion\": \"TLSv1.2_2021\"
              },
              \"HttpVersion\": \"http2and3\",
              \"PriceClass\": \"PriceClass_100\"
            }" --output json)
            
            DIST_ID=$(echo "$RESULT" | jq -r '.Distribution.Id')
            DIST_DOMAIN=$(echo "$RESULT" | jq -r '.Distribution.DomainName')
            echo "CloudFront created: $DIST_ID ($DIST_DOMAIN)"
          else
            DIST_DOMAIN=$(aws cloudfront get-distribution --id "$DIST_ID" \
              --query 'Distribution.DomainName' --output text)
            echo "CloudFront exists: $DIST_ID ($DIST_DOMAIN)"
          fi
          
          echo "=== Step 9: Update Route 53 DNS ==="
          aws route53 change-resource-record-sets --hosted-zone-id "$HOSTED_ZONE_ID" --change-batch "{
            \"Changes\": [
              {
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${SITE}\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                    \"DNSName\": \"${DIST_DOMAIN}\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              },
              {
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"www.${SITE}\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                    \"DNSName\": \"${DIST_DOMAIN}\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }
            ]
          }"
          
          echo ""
          echo "============================================"
          echo "  SETUP COMPLETE"
          echo "============================================"
          echo "S3 Bucket: $BUCKET"
          echo "Certificate: $CERT_ARN"
          echo "CloudFront: $DIST_ID"
          echo "CloudFront Domain: $DIST_DOMAIN"
          echo "DNS: ${SITE} -> $DIST_DOMAIN"
          echo "============================================"
          echo "Next: Run 'deploy' action to upload site files"

      - name: Deploy Site Files
        if: inputs.action == 'deploy'
        run: |
          echo "=== Checking out site files ==="
          # Clone the brainstormagi-site repo
          git clone https://github.com/HCJefe/brainstormagi-site.git site-files 2>/dev/null || {
            echo "No brainstormagi-site repo found. Creating placeholder."
            mkdir -p site-files
            echo "<h1>Brainstorm AGI</h1>" > site-files/index.html
          }
          
          echo "=== Syncing to S3 ==="
          aws s3 sync site-files/ "s3://$BUCKET/" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "README*"
          
          # Set proper content types and cache headers
          echo "=== Setting HTML cache (5 min) ==="
          aws s3 cp "s3://$BUCKET/" "s3://$BUCKET/" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=300" \
            --metadata-directive REPLACE \
            --content-type "text/html"
          
          echo "=== Setting CSS cache (1 year) ==="
          aws s3 cp "s3://$BUCKET/" "s3://$BUCKET/" \
            --recursive \
            --exclude "*" \
            --include "*.css" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE \
            --content-type "text/css"
          
          echo "=== Setting JS cache (1 year) ==="
          aws s3 cp "s3://$BUCKET/" "s3://$BUCKET/" \
            --recursive \
            --exclude "*" \
            --include "*.js" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE \
            --content-type "application/javascript"
          
          # Invalidate CloudFront
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items,'${SITE}')].Id" --output text 2>/dev/null)
          
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            echo "=== Invalidating CloudFront cache ==="
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
          
          echo "=== Deploy complete! Site live at https://${SITE} ==="

      - name: Check Status
        if: inputs.action == 'status'
        run: |
          echo "============================================"
          echo "  BRAINSTORMAGI.COM STATUS"
          echo "============================================"
          
          echo ""
          echo "--- S3 Bucket ---"
          aws s3api head-bucket --bucket "$BUCKET" 2>&1 && echo "Status: EXISTS" || echo "Status: NOT FOUND"
          aws s3 ls "s3://$BUCKET/" --summarize --human-readable 2>/dev/null | tail -2
          
          echo ""
          echo "--- ACM Certificate ---"
          CERT_ARN=$(aws acm list-certificates --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='${SITE}'].CertificateArn" --output text)
          if [ -n "$CERT_ARN" ] && [ "$CERT_ARN" != "None" ]; then
            aws acm describe-certificate --certificate-arn "$CERT_ARN" --region us-east-1 \
              --query 'Certificate.{Status:Status,Domain:DomainName}' --output table
          else
            echo "No certificate found"
          fi
          
          echo ""
          echo "--- CloudFront ---"
          aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items,'${SITE}')].{Id:Id,Domain:DomainName,Status:Status}" --output table 2>/dev/null || echo "No distribution found"
