name: Setup Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create-s3
          - request-cert
          - create-cloudfront
          - update-dns
          - deploy-files
          - full-setup

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  BUCKET_NAME: brainstormagi-com-website
  DOMAIN: brainstormagi.com
  HOSTED_ZONE_ID: Z0634259PESIHO5MNZYR

jobs:
  infrastructure:
    name: ${{ inputs.action }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (us-west-2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::537501962693:role/github-actions-deploy
          aws-region: us-west-2

      # ========== CREATE S3 BUCKET ==========
      - name: Create S3 bucket
        if: inputs.action == 'create-s3' || inputs.action == 'full-setup'
        run: |
          echo "Creating S3 bucket: $BUCKET_NAME"
          aws s3api create-bucket \
            --bucket $BUCKET_NAME \
            --region $AWS_REGION \
            --create-bucket-configuration LocationConstraint=$AWS_REGION 2>&1 || echo "Bucket may already exist"

          aws s3 website s3://$BUCKET_NAME/ \
            --index-document index.html \
            --error-document index.html

          aws s3api put-public-access-block \
            --bucket $BUCKET_NAME \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=false"

          echo "S3 bucket ready!"

      # ========== REQUEST ACM CERT ==========
      - name: Switch to us-east-1 for ACM
        if: inputs.action == 'request-cert' || inputs.action == 'full-setup'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::537501962693:role/github-actions-deploy
          aws-region: us-east-1

      - name: Request ACM certificate
        if: inputs.action == 'request-cert' || inputs.action == 'full-setup'
        id: cert
        run: |
          EXISTING=$(aws acm list-certificates \
            --query "CertificateSummaryList[?DomainName=='$DOMAIN'].CertificateArn" \
            --output text 2>/dev/null)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "Certificate already exists: $EXISTING"
            echo "cert_arn=$EXISTING" >> $GITHUB_OUTPUT
          else
            CERT_ARN=$(aws acm request-certificate \
              --domain-name $DOMAIN \
              --subject-alternative-names "www.$DOMAIN" \
              --validation-method DNS \
              --query CertificateArn \
              --output text)
            echo "Certificate requested: $CERT_ARN"
            echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT
          fi

      - name: Add DNS validation records
        if: inputs.action == 'request-cert' || inputs.action == 'full-setup'
        run: |
          sleep 10
          CERT_ARN="${{ steps.cert.outputs.cert_arn }}"
          echo "Certificate: $CERT_ARN"

          VALIDATION=$(aws acm describe-certificate \
            --certificate-arn $CERT_ARN \
            --query 'Certificate.DomainValidationOptions' \
            --output json)
          echo "Validation records:"
          echo "$VALIDATION" | jq '.'

          # Add each validation record to Route 53
          for i in $(echo "$VALIDATION" | jq -r 'range(length)'); do
            RECORD_NAME=$(echo "$VALIDATION" | jq -r ".[$i].ResourceRecord.Name")
            RECORD_VALUE=$(echo "$VALIDATION" | jq -r ".[$i].ResourceRecord.Value")
            
            if [ -n "$RECORD_NAME" ] && [ "$RECORD_NAME" != "null" ]; then
              echo "Adding validation: $RECORD_NAME -> $RECORD_VALUE"
              aws route53 change-resource-record-sets \
                --hosted-zone-id $HOSTED_ZONE_ID \
                --change-batch "{
                  \"Changes\": [{
                    \"Action\": \"UPSERT\",
                    \"ResourceRecordSet\": {
                      \"Name\": \"$RECORD_NAME\",
                      \"Type\": \"CNAME\",
                      \"TTL\": 300,
                      \"ResourceRecords\": [{\"Value\": \"$RECORD_VALUE\"}]
                    }
                  }]
                }" || echo "Failed to add record for $RECORD_NAME"
            fi
          done

          echo "Waiting for certificate validation..."
          STATUS="PENDING_VALIDATION"
          for attempt in $(seq 1 12); do
            sleep 15
            STATUS=$(aws acm describe-certificate \
              --certificate-arn $CERT_ARN \
              --query 'Certificate.Status' \
              --output text)
            echo "Attempt $attempt: Status = $STATUS"
            if [ "$STATUS" = "ISSUED" ]; then
              echo "Certificate validated!"
              break
            fi
          done

          if [ "$STATUS" != "ISSUED" ]; then
            echo "Certificate not yet validated. May need more time for DNS propagation."
            echo "Current status: $STATUS"
          fi

      # ========== CREATE CLOUDFRONT ==========
      - name: Switch to us-east-1 for CloudFront
        if: inputs.action == 'create-cloudfront' || inputs.action == 'full-setup'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::537501962693:role/github-actions-deploy
          aws-region: us-east-1

      - name: Create CloudFront distribution
        if: inputs.action == 'create-cloudfront' || inputs.action == 'full-setup'
        run: |
          # Get cert
          CERT_ARN=$(aws acm list-certificates \
            --certificate-statuses ISSUED \
            --query "CertificateSummaryList[?DomainName=='$DOMAIN'].CertificateArn" \
            --output text)
          
          if [ -z "$CERT_ARN" ] || [ "$CERT_ARN" == "None" ]; then
            echo "ERROR: No ISSUED certificate found for $DOMAIN"
            echo "Available certs:"
            aws acm list-certificates --output table
            exit 1
          fi
          echo "Using cert: $CERT_ARN"

          # Check existing distribution
          EXISTING_DIST=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, '$DOMAIN')].Id" \
            --output text 2>/dev/null)
          
          if [ -n "$EXISTING_DIST" ] && [ "$EXISTING_DIST" != "None" ]; then
            echo "Distribution already exists: $EXISTING_DIST"
            exit 0
          fi

          # Create OAC
          OAC_ID=$(aws cloudfront create-origin-access-control \
            --origin-access-control-config "{
              \"Name\": \"brainstormagi-oac\",
              \"Description\": \"OAC for brainstormagi.com\",
              \"SigningProtocol\": \"sigv4\",
              \"SigningBehavior\": \"always\",
              \"OriginAccessControlOriginType\": \"s3\"
            }" \
            --query 'OriginAccessControl.Id' \
            --output text 2>&1) || true
          
          if echo "$OAC_ID" | grep -q "Already"; then
            OAC_ID=$(aws cloudfront list-origin-access-controls \
              --query "OriginAccessControlList.Items[?Name=='brainstormagi-oac'].Id" \
              --output text)
          fi
          echo "OAC: $OAC_ID"

          # Create distribution
          DIST_ID=$(aws cloudfront create-distribution \
            --distribution-config "{
              \"CallerReference\": \"brainstormagi-$(date +%s)\",
              \"Aliases\": {\"Quantity\": 2, \"Items\": [\"$DOMAIN\", \"www.$DOMAIN\"]},
              \"DefaultRootObject\": \"index.html\",
              \"Origins\": {
                \"Quantity\": 1,
                \"Items\": [{
                  \"Id\": \"S3-$BUCKET_NAME\",
                  \"DomainName\": \"$BUCKET_NAME.s3.$AWS_REGION.amazonaws.com\",
                  \"OriginAccessControlId\": \"$OAC_ID\",
                  \"S3OriginConfig\": {\"OriginAccessIdentity\": \"\"}
                }]
              },
              \"DefaultCacheBehavior\": {
                \"TargetOriginId\": \"S3-$BUCKET_NAME\",
                \"ViewerProtocolPolicy\": \"redirect-to-https\",
                \"AllowedMethods\": {
                  \"Quantity\": 2, \"Items\": [\"GET\", \"HEAD\"],
                  \"CachedMethods\": {\"Quantity\": 2, \"Items\": [\"GET\", \"HEAD\"]}
                },
                \"CachePolicyId\": \"658327ea-f89d-4fab-a63d-7e88639e58f6\",
                \"Compress\": true
              },
              \"CustomErrorResponses\": {
                \"Quantity\": 1,
                \"Items\": [{
                  \"ErrorCode\": 404,
                  \"ResponsePagePath\": \"/index.html\",
                  \"ResponseCode\": \"200\",
                  \"ErrorCachingMinTTL\": 300
                }]
              },
              \"ViewerCertificate\": {
                \"ACMCertificateArn\": \"$CERT_ARN\",
                \"SSLSupportMethod\": \"sni-only\",
                \"MinimumProtocolVersion\": \"TLSv1.2_2021\"
              },
              \"HttpVersion\": \"http2and3\",
              \"IsIPV6Enabled\": true,
              \"Enabled\": true,
              \"Comment\": \"brainstormagi.com\",
              \"PriceClass\": \"PriceClass_100\"
            }" \
            --query 'Distribution.{Id:Id,Domain:DomainName}' \
            --output json)
          echo "Distribution created: $DIST_ID"

          # Set S3 bucket policy
          aws s3api put-bucket-policy \
            --bucket $BUCKET_NAME \
            --policy "{
              \"Version\": \"2012-10-17\",
              \"Statement\": [{
                \"Sid\": \"CloudFrontOAC\",
                \"Effect\": \"Allow\",
                \"Principal\": {\"Service\": \"cloudfront.amazonaws.com\"},
                \"Action\": \"s3:GetObject\",
                \"Resource\": \"arn:aws:s3:::$BUCKET_NAME/*\",
                \"Condition\": {\"StringEquals\": {\"AWS:SourceAccount\": \"537501962693\"}}
              }]
            }" \
            --region $AWS_REGION
          echo "Bucket policy set!"

      # ========== UPDATE DNS ==========
      - name: Update Route 53 DNS
        if: inputs.action == 'update-dns' || inputs.action == 'full-setup'
        run: |
          CF_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, '$DOMAIN')].DomainName | [0]" \
            --output text 2>/dev/null)
          echo "CloudFront domain: $CF_DOMAIN"
          
          if [ -z "$CF_DOMAIN" ] || [ "$CF_DOMAIN" == "None" ]; then
            echo "No CloudFront distribution found. Create it first."
            exit 1
          fi

          aws route53 change-resource-record-sets \
            --hosted-zone-id $HOSTED_ZONE_ID \
            --change-batch "{
              \"Changes\": [
                {
                  \"Action\": \"UPSERT\",
                  \"ResourceRecordSet\": {
                    \"Name\": \"$DOMAIN\",
                    \"Type\": \"A\",
                    \"AliasTarget\": {
                      \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                      \"DNSName\": \"$CF_DOMAIN\",
                      \"EvaluateTargetHealth\": false
                    }
                  }
                },
                {
                  \"Action\": \"UPSERT\",
                  \"ResourceRecordSet\": {
                    \"Name\": \"www.$DOMAIN\",
                    \"Type\": \"A\",
                    \"AliasTarget\": {
                      \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                      \"DNSName\": \"$CF_DOMAIN\",
                      \"EvaluateTargetHealth\": false
                    }
                  }
                }
              ]
            }"
          echo "DNS updated!"

      # ========== DEPLOY FILES ==========
      - name: Switch to us-west-2 for S3
        if: inputs.action == 'deploy-files' || inputs.action == 'full-setup'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::537501962693:role/github-actions-deploy
          aws-region: us-west-2

      - name: Upload site files
        if: inputs.action == 'deploy-files' || inputs.action == 'full-setup'
        run: |
          # Upload HTML
          aws s3 cp index.html s3://$BUCKET_NAME/index.html \
            --content-type "text/html" \
            --cache-control "public, max-age=300"

          # Upload CSS
          aws s3 sync ./css s3://$BUCKET_NAME/css/ \
            --content-type "text/css" \
            --cache-control "public, max-age=86400"

          # Upload JS
          aws s3 sync ./js s3://$BUCKET_NAME/js/ \
            --content-type "application/javascript" \
            --cache-control "public, max-age=86400"

          # Upload images with correct content types
          if [ -d "./img" ]; then
            for f in ./img/*.webp; do
              [ -f "$f" ] && aws s3 cp "$f" "s3://$BUCKET_NAME/$f" \
                --content-type "image/webp" \
                --cache-control "public, max-age=604800"
            done
            for f in ./img/*.png; do
              [ -f "$f" ] && aws s3 cp "$f" "s3://$BUCKET_NAME/$f" \
                --content-type "image/png" \
                --cache-control "public, max-age=604800"
            done
            for f in ./img/*.jpg ./img/*.jpeg; do
              [ -f "$f" ] && aws s3 cp "$f" "s3://$BUCKET_NAME/$f" \
                --content-type "image/jpeg" \
                --cache-control "public, max-age=604800"
            done
            for f in ./img/*.svg; do
              [ -f "$f" ] && aws s3 cp "$f" "s3://$BUCKET_NAME/$f" \
                --content-type "image/svg+xml" \
                --cache-control "public, max-age=604800"
            done
          fi

          # Upload favicons and other root files
          for f in favicon.ico favicon-16.png favicon-32.png apple-touch-icon.png; do
            if [ -f "$f" ]; then
              aws s3 cp "$f" "s3://$BUCKET_NAME/$f" \
                --cache-control "public, max-age=604800"
            fi
          done

          echo "All files uploaded!"

      - name: Invalidate CloudFront
        if: inputs.action == 'deploy-files' || inputs.action == 'full-setup'
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, '$DOMAIN')].Id | [0]" \
            --output text 2>/dev/null)
          
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $DIST_ID \
              --paths "/*"
            echo "Cache invalidated!"
          else
            echo "No CloudFront distribution yet, skipping"
          fi
