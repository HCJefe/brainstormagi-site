reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches: [main, develop]
  path_instructions:
    - path: "src/**"
      instructions: "Focus on security, performance, and error handling"
    - path: "*.tf"
      instructions: "Validate Terraform best practices"
    - path: "*.py"
      instructions: "Check for Python best practices"
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!.terraform/**"
    - "!package-lock.json"
    - "!yarn.lock"
    - "!.next/**"
    - "!coverage/**"
chat:
  auto_reply: true